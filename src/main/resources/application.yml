spring:
  application:
    name: sehodiary_api

  datasource: # DATABASE
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_NM}
    password: ${DB_PW}

  cache:
    type: redis

  data:
    redis:
      host: localhost
      port: 6379

  jpa: # JPA
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    database: mysql

  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

server:
  port: 8120
  error:
    include-exception: true     # ??? exception? ??? ???? ??
    path: '/error'               # ??? ??? Handler? ??
    whitelabel:
      enabled: true             # ?? ?? ??? ????? ??? ?? ??? ?? ??
  tomcat:
    use-relative-redirects: true
    max-swallow-size: -1
  forward-headers-strategy: framework

cloud:
  aws:
    credentials:
      access-key: ${ACCESS_KEY}
      secret-key: ${SECRET_KEY}
    s3:
      bucket: sehoawsbucket2
    region:
      static: ap-northeast-2
    stack:
      auto: false

webpush:
  public-key: ${WEBPUSH_PUBLIC_KEY}
  private-key: ${WEBPUSH_PRIVATE_KEY}
  subject: ${WEBPUSH_SUBJECT}

fcm:
  firebase-account: ${SERVICE_ACCOUNT_PATH}

rss:
  link-url: ${RSS_LINK_URL}